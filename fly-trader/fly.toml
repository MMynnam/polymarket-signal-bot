# fly.toml app configuration file generated for polymarket-trader-vivid-mountain-9871 on 2026-05-11T10:26:59-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'polymarket-trader-vivid-mountain-9871'
# Moved arn (Stockholm) -> ams (Amsterdam) on 2026-06-02: Polymarket began
# geoblocking the arn egress IP on POST /order (403 "Trading restricted in your
# region") despite Sweden being allowed — i.e. datacenter-IP reputation blocking,
# not country geo. ams gave a fresh, unblocked egress IP. If ams is later blocked,
# rotate to another EU region (cdg/fra/lhr) or route /order via a clean proxy.
primary_region = 'ams'

[build]

[env]
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
